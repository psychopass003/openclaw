# SearXNG configuration settings.yml
# Securely tuned for Hugging Face container constraints
#
# NOTE: secret_key below is a placeholder. entrypoint.sh overwrites it with a
# freshly generated random value on every container boot (Flask/SearXNG uses
# this key to sign session cookies - shipping one fixed value baked into a
# public Docker image/repo means every deployment built from this template
# would share the same key). SearXNG itself is bound to 127.0.0.1 only and is
# never exposed through Nginx, so this is defense-in-depth rather than a
# direct external exposure fix.

use_default_settings: true

server:
  port: 8888
  bind_address: "127.0.0.1"   # Strictly bind to localhost to prevent external access
  secret_key: "__RUNTIME_GENERATED_SECRET__"  # overwritten at container startup, see entrypoint.sh
  limiter: false              # Disable rate limiter for local gateway requests

search:
  safe_search: 0              # 0 = None, 1 = Moderate, 2 = Strict (Unfiltered search queries)
  autocomplete: ""
  relevant_to_search: true

# Enable typical search engines
engines:
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
  - name: google
    engine: google
    shortcut: go
    disabled: false
