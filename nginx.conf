# Writable PID path for non-root execution in Hugging Face Spaces
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Configure temporary paths to /tmp for non-privileged user access
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # Basic performance tuning
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Don't advertise the exact Nginx version to the internet
    server_tokens off;

    # Redirect logging to standard output/error (Hugging Face Console Logs)
    access_log /dev/stdout;
    error_log /dev/stderr info;

    # Secure header mappings
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ------------------------------------------------------------------
    # WHY THE DASHBOARD "COULD NOT CONNECT" (1006):
    # A browser's native WebSocket API doesn't reliably carry cached HTTP
    # Basic Auth credentials the way a normal page load / <script> / fetch()
    # does - and unlike those, a WS handshake that gets back a 401 is NOT
    # transparently retried with credentials by the browser. It just fails,
    # and the WebSocket spec deliberately hides the real HTTP status from
    # JS, so all the dashboard can report is "disconnected (1006): no
    # reason". auth_basic was applied at the server level, so it was being
    # enforced against the WebSocket upgrade too - intermittently, depending
    # on whether that particular connection had already completed a
    # challenge/response. This map exempts ONLY genuine WS upgrade requests
    # (Upgrade: websocket) from the outer Nginx gate; every normal request
    # (the page shell, JS/CSS assets, etc.) still requires Basic Auth as
    # before. The WS channel itself stays protected by the OpenClaw Gateway's
    # own token auth (gateway.auth.mode: "token" in openclaw.json), which is
    # unaffected by this and was never bypassable this way.
    # ------------------------------------------------------------------
    map $http_upgrade $auth_basic_gate {
        default "OpenClaw Gateway - Authorized Access Only";
        "websocket" "off";
    }

    server {
        # Hugging Face Spaces exposes port 7860 to the outside world
        listen 7860;
        server_name localhost;

        # ------------------------------------------------------------------
        # SECURITY: outer login gate.
        # The OpenClaw Gateway behind this proxy has shell/file/browser access,
        # so anyone who can reach it is treated as a fully trusted operator.
        # This HTTP Basic Auth check runs *before* any request reaches the
        # Gateway, so it stays a real second layer even if Gateway-side auth
        # is ever misconfigured. entrypoint.sh generates /app/state/.htpasswd
        # on every boot from the BASIC_AUTH_USER / BASIC_AUTH_PASS Space
        # secrets (or a random throwaway login, printed once to the Space
        # logs, if those secrets aren't set).
        # ------------------------------------------------------------------
        auth_basic $auth_basic_gate;
        auth_basic_user_file /app/state/.htpasswd;

        # Direct root & WebSocket traffic to OpenClaw
        location / {
            proxy_pass http://127.0.0.1:18789;

            # Protocols
            proxy_http_version 1.1;

            # WebSocket upgrade routing (Required for the iOS App and interactive terminal UI)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Host header only - see note below on why we deliberately do NOT
            # send X-Forwarded-For / X-Real-IP / X-Forwarded-Proto to the Gateway.
            proxy_set_header Host $host;

            # ------------------------------------------------------------------
            # WHY WE DO NOT SEND X-Forwarded-For / X-Real-IP / X-Forwarded-Proto:
            # OpenClaw (since v2026.4.22, commit dc2c3a4) classifies ANY request
            # carrying those headers as non-local, even when the TCP peer is
            # 127.0.0.1 and even when that peer is listed in the Gateway's own
            # trustedProxies. The trustedProxies exemption that's supposed to
            # cover exactly this case is accepted in code but never actually
            # used (see openclaw/openclaw#71103, closed upstream as "not
            # planned"). Practical effect: the dashboard's own WebSocket gets
            # misclassified as a remote connection, gets routed into a
            # device-pairing challenge that can't complete over this path, and
            # the browser just sees "Could not connect" - which is what you hit.
            #
            # We previously sent these headers (overwritten, not appended - see
            # git history) specifically so the Gateway could see real client
            # IPs while trusting gateway.trustedProxies: ["127.0.0.1"]. Given
            # the upstream regression above, that protection is currently
            # nullified anyway (the Gateway ignores trustedProxies once any of
            # these headers are present, whether or not the IP checks out), and
            # in the meantime it actively breaks the one legitimate loopback
            # connection this container makes to itself. So: don't send them.
            #
            # What this costs: the Gateway's per-client-IP failed-auth rate
            # limiter (gateway.auth.rateLimit) will see every request as
            # coming from 127.0.0.1 instead of the real visitor IP. This is a
            # narrower loss than it sounds - per OpenClaw's own docs, browser
            # WebSocket/Control-UI auth attempts are ALWAYS rate-limited with
            # loopback exemption disabled and are bucketed per Origin, not per
            # IP, specifically as defense-in-depth against localhost brute
            # force. Every request here is still gated first by Nginx Basic
            # Auth (a real client-IP-independent secret) before it ever
            # reaches the Gateway. gateway.trustedProxies: ["127.0.0.1"] stays
            # in openclaw.json as harmless documentation/forward-compat in
            # case OpenClaw fixes #71103 upstream.
            #
            # If OpenClaw fixes #71103, these headers can be safely restored:
            #   proxy_set_header X-Real-IP $remote_addr;
            #   proxy_set_header X-Forwarded-For $remote_addr;
            #   proxy_set_header X-Forwarded-Proto $scheme;
            # ------------------------------------------------------------------

            # Disable output buffering to eliminate streaming/text completion lag
            proxy_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # SearXNG (8888) is internal only and NOT mapped in this block.
        # This keeps the search engine completely private from external web access.
    }
}