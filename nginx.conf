# Writable PID path for non-root execution in Hugging Face Spaces
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Configure temporary paths to /tmp for non-privileged user access
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # Basic performance tuning
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Don't advertise the exact Nginx version to the internet
    server_tokens off;

    # Redirect logging to standard output/error (Hugging Face Console Logs)
    #
    # NOTE: error_log level lowered from "info" to "warn". At "info", nginx
    # logs a line for every raw TCP probe that never sends a request - which
    # is what Hugging Face's own container health-checker does to port 7860,
    # dozens of times a minute ("client closed connection while waiting for
    # request") - plus a line every time a keep-alive connection closes
    # normally. Neither is an error; both were drowning out the signal in
    # the Logs tab. Basic Auth failures ("no user/password was provided...")
    # are logged by nginx's auth module at the "error" level, which is ABOVE
    # "warn", so those still show - only the sub-"warn" connection chatter is
    # now suppressed. access_log (the per-request GET/status lines) is
    # unaffected either way.
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # Secure header mappings
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ------------------------------------------------------------------
    # WHY THE DASHBOARD "COULD NOT CONNECT" (1006):
    # A browser's native WebSocket API doesn't reliably carry cached HTTP
    # Basic Auth credentials the way a normal page load / <script> / fetch()
    # does - and unlike those, a WS handshake that gets back a 401 is NOT
    # transparently retried with credentials by the browser. It just fails,
    # and the WebSocket spec deliberately hides the real HTTP status from
    # JS, so all the dashboard can report is "disconnected (1006): no
    # reason". auth_basic was applied at the server level, so it was being
    # enforced against the WebSocket upgrade too - intermittently, depending
    # on whether that particular connection had already completed a
    # challenge/response. This map exempts ONLY genuine WS upgrade requests
    # (Upgrade: websocket) from the outer Nginx gate; every normal request
    # (the page shell, JS/CSS assets, etc.) still requires Basic Auth as
    # before. The WS channel itself stays protected by the OpenClaw Gateway's
    # own token auth (gateway.auth.mode: "token" in openclaw.json), which is
    # unaffected by this and was never bypassable this way.
    # ------------------------------------------------------------------
    map $http_upgrade $auth_basic_gate {
        default "OpenClaw Gateway - Authorized Access Only";
        "websocket" "off";
    }

    server {
        # Hugging Face Spaces exposes port 7860 to the outside world
        listen 7860;
        server_name localhost;

        # ------------------------------------------------------------------
        # SECURITY: outer login gate.
        # The OpenClaw Gateway behind this proxy has shell/file/browser access,
        # so anyone who can reach it is treated as a fully trusted operator.
        # This HTTP Basic Auth check runs *before* any request reaches the
        # Gateway, so it stays a real second layer even if Gateway-side auth
        # is ever misconfigured. entrypoint.sh generates /app/state/.htpasswd
        # on every boot from the BASIC_AUTH_USER / BASIC_AUTH_PASS Space
        # secrets (or a random throwaway login, printed once to the Space
        # logs, if those secrets aren't set).
        # ------------------------------------------------------------------
        auth_basic $auth_basic_gate;
        auth_basic_user_file /app/state/.htpasswd;

        # ------------------------------------------------------------------
        # WHY THE REPEATING "no user/password was provided" 401s (and the
        # native login popup reappearing mid-session, forcing a Cancel):
        # manifest.webmanifest, favicon*, sw.js, avatar images, and
        # control-ui-config.json are not fetched the way a normal same-origin
        # request is. Browsers fetch the PWA manifest, favicon, and <img>-tag
        # resources (which is what triggers the native credential popup, not
        # just a silent fetch() 401) through separate internal subsystems
        # that are well documented (long-standing, largely WONTFIX'd
        # Chromium/Firefox behavior) to NOT attach cached HTTP Basic Auth
        # credentials, even to a same-origin, already-authenticated realm. A
        # registered service worker's own background fetches (update checks,
        # precache) have the same gap, since they can fire with no page
        # attached to inherit credentials from. control-ui-config.json is
        # fetched by the Control UI's own JS before the user has entered
        # anything, to render the connect screen - by design something an
        # unauthenticated browser needs to read, in OpenClaw's own security
        # model. /avatar/<session> is the same class of issue as favicon: a
        # plain <img src> load, same browser gap, added here because it was
        # still hitting the general Basic Auth gate and popping the native
        # login dialog mid-session.
        #
        # This is NOT the same failure as the WebSocket one above, and
        # fixing it does NOT touch that fix: this exempts a short, exact
        # list of non-sensitive static/config paths (icons, manifest, avatar
        # images, and public pre-login UI config - nothing that
        # authenticates or executes anything) from auth_basic; everything
        # else, including the page shell at /, /chat, and the WS endpoint, is
        # unaffected and still requires Basic Auth (or, for the WS upgrade
        # specifically, the Gateway's own token auth per the map above).
        # limit_except locks this block to GET/HEAD so the exemption can
        # never be used against a write/action endpoint, now or if one is
        # ever added under one of these same path prefixes later.
        # ------------------------------------------------------------------
        location ~ ^/(favicon\.ico|favicon\.svg|favicon-16\.png|favicon-32\.png|apple-touch-icon\.png|manifest\.webmanifest|sw\.js|control-ui-config\.json|robots\.txt|avatar/[^/]+)$ {
            auth_basic off;
            limit_except GET {
                deny all;
            }
            proxy_pass http://127.0.0.1:18789;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Direct root & WebSocket traffic to OpenClaw
        location / {
            proxy_pass http://127.0.0.1:18789;

            # Protocols
            proxy_http_version 1.1;

            # WebSocket upgrade routing (Required for the iOS App and interactive terminal UI)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Real client headers.
            # SECURITY FIX: previously this used $proxy_add_x_forwarded_for, which
            # APPENDS to any X-Forwarded-For a client sends in - letting a remote
            # visitor claim to be "127.0.0.1" and ride on OpenClaw's loopback trust
            # path. Overwriting with $remote_addr (Nginx's own view of who connected)
            # matches OpenClaw's documented "good reverse proxy" behavior, and pairs
            # with gateway.trustedProxies: ["127.0.0.1"] in openclaw.json so the
            # Gateway only trusts this header coming from Nginx itself.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable output buffering to eliminate streaming/text completion lag
            proxy_buffering off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # SearXNG (8888) is internal only and NOT mapped in this block.
        # This keeps the search engine completely private from external web access.
    }
}
